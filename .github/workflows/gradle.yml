name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17 (for SDK tools)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 20.1 (compatible with AGP 3.5.4)
        run: |
          # Download NDK r20b (version 20.1.5948944)
          wget -q https://dl.google.com/android/repository/android-ndk-r20b-linux-x86_64.zip
          unzip -q android-ndk-r20b-linux-x86_64.zip -d $ANDROID_HOME/ndk/
          # Rename to match the version expected by Gradle
          mv $ANDROID_HOME/ndk/android-ndk-r20b $ANDROID_HOME/ndk/20.1.5948944
          rm android-ndk-r20b-linux-x86_64.zip
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Switch to JDK 8 (for Gradle build)
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build with Gradle
        run: ./gradlew build --no-daemon --stacktrace

      - name: Upload APK (optional)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
